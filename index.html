<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber Eats LatAm | AI Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;overflow:hidden;height:100vh}
:root{--green:#06C167;--blue:#276EF1;--red:#E11D48;--amber:#F5A623;--dark:#0a0a0a;--white:#FFF}

/* TOP NAV */
.hub-nav{height:56px;background:#000;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #222;z-index:9999;position:relative}
.hub-logo{font-size:22px;font-weight:800;color:var(--white);letter-spacing:-0.5px}
.hub-logo span{color:var(--green)}
.hub-logo .sub{font-size:12px;color:#666;font-weight:400;margin-left:12px;letter-spacing:0.5px;text-transform:uppercase}
.hub-tabs{display:flex;gap:4px;margin-left:40px;background:rgba(255,255,255,0.06);border-radius:10px;padding:4px}
.htab{padding:10px 22px;border-radius:8px;border:none;background:transparent;color:#777;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px;white-space:nowrap}
.htab:hover{color:var(--white);background:rgba(255,255,255,0.06)}
.htab.on{background:var(--green);color:#000}
.htab .icon{font-size:16px}
.hub-badge{margin-left:auto;display:flex;align-items:center;gap:12px}
.hub-badge .status{display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.hub-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.hub-badge .by{font-size:11px;color:#444;border-left:1px solid #333;padding-left:12px}

/* FRAME AREA */
.frame-wrap{width:100%;height:calc(100vh - 56px);position:relative}
.frame-wrap iframe{width:100%;height:100%;border:none;position:absolute;top:0;left:0;opacity:0;pointer-events:none;transition:opacity .3s}
.frame-wrap iframe.on{opacity:1;pointer-events:auto}

/* LOADING OVERLAY */
.loading{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .5s}
.loading.done{opacity:0;pointer-events:none}
.loading .spinner{width:40px;height:40px;border:3px solid #222;border-top:3px solid var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .lt{margin-top:16px;color:#555;font-size:13px}

/* BREADCRUMB BAR */
.breadcrumb{position:absolute;top:0;left:0;right:0;height:0;overflow:hidden;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);z-index:5;transition:height .3s;display:flex;align-items:center;padding:0 24px;gap:16px}
.breadcrumb.show{height:44px}
.breadcrumb .bc-item{font-size:12px;color:#888;cursor:pointer;transition:color .2s}
.breadcrumb .bc-item:hover{color:var(--green)}
.breadcrumb .bc-sep{color:#444;font-size:10px}
.breadcrumb .bc-current{color:var(--green);font-weight:600}
.breadcrumb .bc-close{margin-left:auto;background:none;border:none;color:#666;font-size:18px;cursor:pointer}
.breadcrumb .bc-close:hover{color:var(--red)}

/* MINI MAP */
.minimap{position:fixed;bottom:16px;right:16px;width:220px;height:160px;border-radius:12px;overflow:hidden;border:2px solid #333;z-index:20;display:none;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.minimap:hover{border-color:var(--green);transform:scale(1.03)}
.minimap iframe{width:440px;height:320px;transform:scale(0.5);transform-origin:top left;pointer-events:none}
.minimap .mm-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);padding:4px 8px;font-size:10px;color:var(--green);font-weight:600;text-align:center}

/* QUICK STATS TICKER */
.quick-ticker{position:absolute;bottom:0;left:0;right:0;height:32px;background:rgba(0,0,0,0.85);border-top:1px solid #222;display:flex;align-items:center;z-index:6;overflow:hidden}
.qt-label{padding:0 12px;font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;white-space:nowrap;letter-spacing:1px}
.qt-scroll{flex:1;overflow:hidden;position:relative}
.qt-track{display:flex;animation:qtscroll 80s linear infinite;white-space:nowrap}
.qt-item{padding:0 28px;font-size:11px;color:#666}
.qt-item strong{color:#999}
@keyframes qtscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="hub-nav">
  <div class="hub-logo">Uber<span>Eats</span> <span class="sub">AI Command Center</span></div>
  <div class="hub-tabs">
    <button class="htab on" onclick="switchHub(this,0)"><span class="icon">&#x1F4CA;</span> Performance Hub</button>
    <button class="htab" onclick="switchHub(this,1)"><span class="icon">&#x1F30E;</span> Territory Overview</button>
    <button class="htab" onclick="switchHub(this,2)"><span class="icon">&#x1F4CD;</span> Geo Intelligence</button>
  </div>
  <div class="hub-badge">
    <div class="status"><span class="dot"></span> AI Active</div>
    <div class="by">Nicolas Gnecco | LatAm BPO</div>
  </div>
</div>

<!-- FRAMES -->
<div class="frame-wrap" id="frameWrap">
  <div class="loading" id="loader"><div class="spinner"></div><div class="lt">Loading dashboards...</div></div>
  <iframe id="f0" class="on" src="dashboard.html" onload="frameLoaded(0)"></iframe>
  <iframe id="f1" src="territory_dashboard.html" onload="frameLoaded(1)"></iframe>
  <iframe id="f2" src="territory_v2.html" onload="frameLoaded(2)"></iframe>

  <!-- CROSS-NAV BREADCRUMB -->
  <div class="breadcrumb" id="breadcrumb">
    <span class="bc-item" onclick="switchHub(document.querySelectorAll('.htab')[0],0)">Command Center</span>
    <span class="bc-sep">&rsaquo;</span>
    <span class="bc-current" id="bcCurrent">Performance Hub</span>
    <button class="bc-close" onclick="closeBreadcrumb()">&times;</button>
  </div>

  <!-- QUICK STATS TICKER -->
  <div class="quick-ticker">
    <div class="qt-label">AI Insights</div>
    <div class="qt-scroll">
      <div class="qt-track" id="qtTrack"></div>
    </div>
  </div>
</div>

<!-- MINIMAP (shows geo when on other tabs) -->
<div class="minimap" id="minimap" onclick="switchHub(document.querySelectorAll('.htab')[2],2)">
  <iframe src="territory_v2.html" scrolling="no"></iframe>
  <div class="mm-label">Click for Geo View</div>
</div>

<script>
var frames = [document.getElementById('f0'), document.getElementById('f1'), document.getElementById('f2')];
var loaded = [false, false, false];
var current = 0;
var tabNames = ['Performance Hub', 'Territory Overview', 'Geo Intelligence'];

function frameLoaded(i) {
  loaded[i] = true;
  var allDone = loaded[0] && loaded[1] && loaded[2];
  if (allDone) {
    setTimeout(function() {
      document.getElementById('loader').classList.add('done');
    }, 400);
  }
}

function switchHub(el, idx) {
  if (idx === current) return;
  var tabs = document.querySelectorAll('.htab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('on');
  }
  el.classList.add('on');

  for (var j = 0; j < frames.length; j++) {
    frames[j].classList.remove('on');
  }
  frames[idx].classList.add('on');
  current = idx;

  // Update breadcrumb
  document.getElementById('bcCurrent').textContent = tabNames[idx];

  // Show minimap when NOT on geo view
  document.getElementById('minimap').style.display = (idx === 2) ? 'none' : 'block';
}

function closeBreadcrumb() {
  document.getElementById('breadcrumb').classList.remove('show');
}

// TICKER DATA
var insights = [
  'Mexico has the largest pipeline with 7,100+ opportunities but only 27% win rate — high upside with process optimization',
  'Colombia leads activation at 72% — study their onboarding playbook for cross-market replication',
  '60.4% of closed-lost deals have "Unable to Determine" as reason — mandatory disposition would unlock root-cause visibility',
  'CDMX has 234 untapped restaurants in high-demand zones — priority territory for outbound cadence',
  'Top 10% of sellers achieve 45%+ win rate vs bottom quartile at 8% — coaching gap is the #1 lever',
  'Outbound win rate (16.2%) is half of inbound (34.8%) — SPICED methodology could close this gap by 8-12pp',
  'Zombie leads (90+ days stuck) represent 12% of pipeline — weekly pipeline hygiene could recover 150+ deals/quarter',
  '31.5% of closed-won restaurants never activated — Mutual Action Plans could recover $2.4M in annual GMV',
  'Peru and Ecuador show 38%+ win rates with smaller teams — potential best-practice exporters',
  'Menu quality correlates with activation: restaurants with photos activate 2.3x faster',
  'Guatemala has lowest coverage (18%) but highest demand index — #1 expansion priority',
  'Average days-to-close is 23 days — reducing by 5 days through better qualification could add 15% capacity',
  'Costa Rica sellers average 89 deals each — highest per-capita productivity in the region',
  'Barranquilla zone shows 3x growth potential vs current coverage — recommend dedicated squad',
  'AI coaching recommendations: focus bottom 40% of sellers on discovery skills before volume targets'
];

function buildTicker() {
  var track = document.getElementById('qtTrack');
  var h = '';
  for (var r = 0; r < 2; r++) {
    for (var i = 0; i < insights.length; i++) {
      h += '<div class="qt-item">' + insights[i] + '</div>';
    }
  }
  track.innerHTML = h;
}
buildTicker();

// Show minimap initially (we start on performance hub, not geo)
document.getElementById('minimap').style.display = 'block';

// Listen for messages from child frames for cross-navigation
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'navigate') {
    if (e.data.target === 'territory') {
      switchHub(document.querySelectorAll('.htab')[1], 1);
    } else if (e.data.target === 'geo') {
      switchHub(document.querySelectorAll('.htab')[2], 2);
    } else if (e.data.target === 'performance') {
      switchHub(document.querySelectorAll('.htab')[0], 0);
    }
  }
  if (e.data && e.data.type === 'breadcrumb') {
    document.getElementById('bcCurrent').textContent = e.data.text;
    document.getElementById('breadcrumb').classList.add('show');
  }
});
</script>
</body>
</html>
